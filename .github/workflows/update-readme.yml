name: Update README

on:
schedule:
- cron: "0 */6 * * *"
workflow_dispatch:

permissions:
contents: write

jobs:
update-readme:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v3

  - name: Generate repository list
    env:
      USERNAME: abhaycore
    run: |
      echo "# 🚀 Repositories" > repo-list.md
      echo "" >> repo-list.md

      curl -s "https://api.github.com/users/$USERNAME/repos?per_page=100&sort=updated" \
      | jq -r '.[] | "- [\(.name)](\(.html_url))"' \
      >> repo-list.md

  - name: Update README
    run: |
      python << EOF
      from pathlib import Path

      readme = Path("README.md").read_text()
      repos = Path("repo-list.md").read_text()

      start = "<!-- REPO-LIST:START -->"
      end = "<!-- REPO-LIST:END -->"

      new_readme = readme.split(start)[0] + start + "\n" + repos + "\n" + end + readme.split(end)[1]

      Path("README.md").write_text(new_readme)
      EOF

  - name: Commit and Push
    run: |
      git config user.name "github-actions"
      git config user.email "github-actions@github.com"

      git add README.md
      git commit -m "Auto-update repository list" || exit 0
      git push
```
